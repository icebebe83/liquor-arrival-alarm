name: Liquor Arrival Alarm

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions uses UTC. These entries map to 06:00, 07:00, 08:00, 10:00, 11:00, 12:00 KST.
    - cron: "0 21,22,23 * * *"
    - cron: "0 1,2,3 * * *"

concurrency:
  group: liquor-arrival-alarm
  cancel-in-progress: false

jobs:
  check-new-arrivals:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check new arrivals
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_STORAGE_BUCKET: liquor-alarm
          SUPABASE_STORAGE_OBJECT: products.json
        run: npm start
